version: '3.8'

services:
  ai-medical:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./cache:/app/cache
      - ./governance:/app/governance
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MODEL_DIR=/app/models
      - KNOWLEDGE_DIR=/app/knowledge
      - DEBUG=False
    restart: unless-stopped